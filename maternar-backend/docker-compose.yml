services:
  db:
    image: 'postgres:16'
    container_name: prisma-local
    restart: 'unless-stopped'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: gestasus_password
      POSTGRES_DB: gestasus_db
    ports:
      - '5490:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: