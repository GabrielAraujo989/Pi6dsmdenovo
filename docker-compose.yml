services:
  postgres:
    image: postgres:16
    container_name: maternar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: gestasus_password
      POSTGRES_DB: gestasus_db
    ports:
      - '5490:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - maternar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gestasus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: maternar_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: maternar
      RABBITMQ_DEFAULT_PASS: maternar_pass
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - maternar_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./ApiDatasus/flask_api
      dockerfile: Dockerfile
    image: maternar_worker:latest
    container_name: maternar_worker
    restart: unless-stopped
    command: python worker.py
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: gestasus_db
      PGUSER: admin
      PGPASSWORD: gestasus_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: maternar
      RABBITMQ_PASSWORD: maternar_pass
      RABBITMQ_VHOST: /
      QUEUE_CLASSIFY: maternar.classificar
      QUEUE_DLX: maternar.classificar.dlq
      MODEL_DIR: /app/models
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - maternar_net

networks:
  maternar_net:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
